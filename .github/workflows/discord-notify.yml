name: Discord Notify

on:
  push:
  pull_request:
  issues:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            MESSAGE="🚀 Push to ${{ github.repository }} by ${{ github.actor }}: ${{ github.event.head_commit.message }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            MESSAGE="🔀 PR ${{ github.event.action }}: ${{ github.event.pull_request.title }}"
          else
            MESSAGE="🐛 Issue ${{ github.event.action }}: ${{ github.event.issue.title }}"
          fi

          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"$MESSAGE\"}" \
            "$DISCORD_WEBHOOK_URL"